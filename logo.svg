
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Baseball background circle -->
  <circle cx="60" cy="60" r="50" fill="#ffffff" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- Baseball stitching curves -->
  <path d="M 30 45 Q 45 35, 60 45 Q 75 55, 90 45" 
        stroke="#e74c3c" stroke-width="2" fill="none"/>
  <path d="M 30 75 Q 45 85, 60 75 Q 75 65, 90 75" 
        stroke="#e74c3c" stroke-width="2" fill="none"/>
  
  <!-- Baseball stitching lines -->
  <g stroke="#e74c3c" stroke-width="1.5">
    <line x1="35" y1="42" x2="40" y2="48"/>
    <line x1="42" y1="38" x2="47" y2="44"/>
    <line x1="49" y1="36" x2="54" y2="42"/>
    <line x1="56" y1="36" x2="61" y2="42"/>
    <line x1="63" y1="36" x2="68" y2="42"/>
    <line x1="70" y1="38" x2="75" y2="44"/>
    <line x1="77" y1="42" x2="82" y2="48"/>
    
    <line x1="35" y1="78" x2="40" y2="72"/>
    <line x1="42" y1="82" x2="47" y2="76"/>
    <line x1="49" y1="84" x2="54" y2="78"/>
    <line x1="56" y1="84" x2="61" y2="78"/>
    <line x1="63" y1="84" x2="68" y2="78"/>
    <line x1="70" y1="82" x2="75" y2="76"/>
    <line x1="77" y1="78" x2="82" y2="72"/>
  </g>
  
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#34495e" stroke-width="2"/>
</svg>
