<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Elektros Objektai</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>⚡ Elektros Objektai</h1>
    </header>

    <div id="objects-view" class="view active">
      <div class="toolbar">
        <h2>Mano objektai</h2>
        <button id="add-object-btn" class="btn-primary">+ Naujas objektas</button>
      </div>
      <div id="objects-list" class="list"></div>
      <div id="empty-state" class="empty-state">
        <p>Dar nėra objektų</p>
        <p class="hint">Paspauskite „+ Naujas objektas" norėdami pradėti</p>
      </div>
    </div>

    <div id="object-form-view" class="view">
      <div class="toolbar">
        <button id="form-back-btn" class="btn-back">← Atgal</button>
        <h2 id="form-title">Naujas objektas</h2>
      </div>
      <form id="object-form">
        <div class="form-group">
          <label for="obj-name">Pavadinimas *</label>
          <input type="text" id="obj-name" placeholder="pvz. Namo elektra, Biuro remontas..." required />
        </div>
        <div class="form-group">
          <label for="obj-address">Adresas</label>
          <input type="text" id="obj-address" placeholder="Adresas arba vieta" />
        </div>
        <div class="form-group">
          <label for="obj-client">Klientas</label>
          <input type="text" id="obj-client" placeholder="Kliento vardas / įmonė" />
        </div>
        <div class="form-group">
          <label for="obj-phone">Telefonas</label>
          <input type="tel" id="obj-phone" placeholder="Telefono numeris" />
        </div>
        <div class="form-group">
          <label for="obj-status">Statusas</label>
          <select id="obj-status">
            <option value="naujas">Naujas</option>
            <option value="vykdomas">Vykdomas</option>
            <option value="uzbaigtas">Užbaigtas</option>
          </select>
        </div>
        <div class="form-group">
          <label for="obj-notes">Pastabos</label>
          <textarea id="obj-notes" rows="3" placeholder="Papildoma informacija..."></textarea>
        </div>
        <button type="submit" class="btn-primary btn-full">Išsaugoti</button>
      </form>
    </div>

    <div id="object-detail-view" class="view">
      <div class="toolbar">
        <button id="detail-back-btn" class="btn-back">← Atgal</button>
        <div class="toolbar-actions">
          <button id="edit-object-btn" class="btn-icon" title="Redaguoti">✏️</button>
          <button id="delete-object-btn" class="btn-icon btn-danger" title="Ištrinti">🗑️</button>
        </div>
      </div>
      <div id="object-detail" class="detail-content"></div>

      <div class="section-header">
        <h3>Medžiagos</h3>
        <button id="add-material-btn" class="btn-small">+ Pridėti</button>
      </div>
      <div id="materials-list" class="list"></div>
      <div id="materials-empty" class="empty-state small">
        <p>Nėra medžiagų</p>
      </div>
      <div id="materials-total" class="materials-total"></div>
    </div>

    <div id="material-form-view" class="view">
      <div class="toolbar">
        <button id="material-form-back-btn" class="btn-back">← Atgal</button>
        <h2 id="material-form-title">Nauja medžiaga</h2>
      </div>
      <form id="material-form">
        <div class="form-group">
          <label for="mat-name">Pavadinimas *</label>
          <input type="text" id="mat-name" placeholder="pvz. Kabelis YDY 3x2.5..." required />
        </div>
        <div class="form-group">
          <label for="mat-quantity">Kiekis *</label>
          <input type="number" id="mat-quantity" step="0.01" min="0" placeholder="0" required />
        </div>
        <div class="form-group">
          <label for="mat-unit">Matavimo vienetas</label>
          <select id="mat-unit">
            <option value="vnt">vnt.</option>
            <option value="m">m</option>
            <option value="kg">kg</option>
            <option value="kompl">kompl.</option>
            <option value="rit">rit.</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mat-price">Kaina (€)</label>
          <input type="number" id="mat-price" step="0.01" min="0" placeholder="0.00" />
        </div>
        <button type="submit" class="btn-primary btn-full">Išsaugoti medžiagą</button>
      </form>
    </div>
  </div>

  <div id="confirm-modal" class="modal">
    <div class="modal-content">
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn-secondary">Atšaukti</button>
        <button id="confirm-ok" class="btn-danger">Ištrinti</button>
      </div>
    </div>
  </div>

  <script type="module" src="/script.js"></script>
</body>
</html>
